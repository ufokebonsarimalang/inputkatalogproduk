<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Input Data Barang</title>
    <style>
        :root {
            --primary: #0284c7;
            --primary-hover: #0369a1;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --border: #e2e8f0;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background: var(--card-bg);
            width: 100%;
            max-width: 600px;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .header h2 {
            color: var(--primary);
            font-size: 24px;
            margin-bottom: 5px;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 6px;
            color: #334155;
        }

        /* MEMAKSA TAMPILAN MENJADI HURUF BESAR SAAT DIKETIK */
        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            background-color: #fff;
            color: var(--text);
            transition: border-color 0.2s;
            text-transform: uppercase; 
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(2, 132, 199, 0.1);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .spek-section {
            background: #f1f5f9;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
            border: 1px dashed #cbd5e1;
        }

        .spek-section legend {
            font-size: 13px;
            font-weight: bold;
            color: #475569;
            padding: 0 8px;
        }

        .btn-submit {
            width: 100%;
            padding: 12px;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        .btn-submit:hover {
            background-color: var(--primary-hover);
        }

        .btn-submit:disabled {
            background-color: #94a3b8;
            cursor: not-allowed;
        }

        .notif {
            display: none;
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 6px;
            color: white;
            font-weight: 500;
            box-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1);
            z-index: 1000;
            animation: slideIn 0.3s ease-out;
        }

        .notif.sukses { background-color: #10b981; }
        .notif.gagal { background-color: #ef4444; }

        @keyframes slideIn {
            from { transform: translateY(-20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s ease-in-out infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="header">
            <h2>Form Input Spesifikasi Barang</h2>
            <p>Masukkan data untuk tampil di katalog</p>
        </div>

        <form id="formKatalog" onsubmit="kirimData(event)">
            <div class="grid-2">
                <div class="form-group">
                    <label for="brand">Brand</label>
                    <input type="text" id="brand" required placeholder="Contoh: GREE, Samsung">
                </div>
                <div class="form-group">
                    <label for="tipe">Tipe</label>
                    <input type="text" id="tipe" required placeholder="Contoh: GWC-05MOO5">
                </div>
            </div>

            <div class="grid-2">
                <div class="form-group">
                    <label for="kategori">Kategori</label>
                    <input type="text" id="kategori" required placeholder="Contoh: ELEKTRONIK,RUMAH TANGGA">
                </div>
                <div class="form-group">
                    <label for="subKategori">Subkategori</label>
                    <input type="text" id="subKategori" placeholder="Contoh: AC,LEMARI ES,Smart TV">
                </div>
            </div>

            <fieldset class="spek-section">
                <legend>Fitur & Spesifikasi Utama</legend>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="spek1">Spek 1</label>
                        <input type="text" id="spek1" placeholder="Contoh: 0.5 PK">
                    </div>
                    <div class="form-group">
                        <label for="spek2">Spek 2</label>
                        <input type="text" id="spek2" placeholder="Contoh: 350 Watt">
                    </div>
                </div>
                <div class="grid-2">
                    <div class="form-group">
                        <label for="spek3">Spek 3</label>
                        <input type="text" id="spek3" placeholder="Contoh: R32 Eco Friendly">
                    </div>
                    <div class="form-group">
                        <label for="spek4">Spek 4</label>
                        <input type="text" id="spek4" placeholder="Contoh: Garansi 5 Tahun">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label for="spek5">Spek 5</label>
                    <input type="text" id="spek5" placeholder="Contoh: Triple Protection">
                </div>
            </fieldset>

            <button type="submit" id="btnSubmit" class="btn-submit">
                <div class="spinner" id="loadingSpinner"></div>
                <span id="btnText">Simpan Data Barang</span>
            </button>
        </form>
    </div>

    <div id="toast" class="notif"></div>

    <script>
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqnu2yJWk3Bb8JPSVy8ZSZxs5Ae4VGSNpRJl1j3Qgkoj-27FQX_ys4-8qyyyrbXJhQ/exec";

        function tampilkanNotif(pesan, jenis) {
            const toast = document.getElementById('toast');
            toast.innerText = pesan;
            toast.className = `notif ${jenis}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 4000);
        }

        function kirimData(e) {
            e.preventDefault();

            const btnSubmit = document.getElementById('btnSubmit');
            const spinner = document.getElementById('loadingSpinner');
            const btnText = document.getElementById('btnText');

            btnSubmit.disabled = true;
            spinner.style.display = 'block';
            btnText.innerText = 'Sedang Menyimpan...';

            const payload = {
                aksi: "tambah_barang",
                brand: document.getElementById('brand').value.trim().toUpperCase(),
                tipe: document.getElementById('tipe').value.trim().toUpperCase(),
                kategori: document.getElementById('kategori').value.trim().toUpperCase(),
                subKategori: document.getElementById('subKategori').value.trim().toUpperCase() || "-",
                spek1: document.getElementById('spek1').value.trim().toUpperCase() || "-",
                spek2: document.getElementById('spek2').value.trim().toUpperCase() || "-",
                spek3: document.getElementById('spek3').value.trim().toUpperCase() || "-",
                spek4: document.getElementById('spek4').value.trim().toUpperCase() || "-",
                spek5: document.getElementById('spek5').value.trim().toUpperCase() || "-"
            };

            fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            })
            .then(res => res.json())
            .then(data => {
                if(data.status === "sukses") {
                    tampilkanNotif("Berhasil! Data barang masuk ke sheet KATALOG.", "sukses");
                    document.getElementById('formKatalog').reset();
                } else {
                    tampilkanNotif("Gagal: " + data.pesan, "gagal");
                }
            })
            .catch(err => {
                tampilkanNotif("Terjadi gangguan jaringan atau URL Script salah.", "gagal");
                console.error(err);
            })
            .finally(() => {
                btnSubmit.disabled = false;
                spinner.style.display = 'none';
                btnText.innerText = 'Simpan Data Barang';
            });
        }
    </script>
</body>
</html>
